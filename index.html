<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>宿舍電費追蹤</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
    <style>
        :root {
            --bg: #EEF2FF;
            --surface: #FFFFFF;
            --primary: #4F46E5;
            --primary-dark: #4338CA;
            --success: #10B981;
            --warning: #F59E0B;
            --danger: #EF4444;
            --text: #1E293B;
            --text-sub: #64748B;
            --border: #E2E8F0;
            --shadow: 0 1px 3px rgba(0,0,0,0.07), 0 4px 16px rgba(79,70,229,0.07);
            --radius: 16px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans TC', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 24px 20px;
        }

        .container { max-width: 1080px; margin: 0 auto; }

        /* ── 頁首 ── */
        .header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            margin-bottom: 24px;
        }
        .header h1 {
            font-size: 1.6rem;
            font-weight: 800;
            color: var(--primary);
            letter-spacing: -0.5px;
        }
        .header-sub { font-size: 0.85rem; color: var(--text-sub); margin-top: 2px; }
        .header-time { text-align: right; }
        .header-time .date { font-size: 0.85rem; color: var(--text-sub); }
        .header-time .time {
            font-size: 1.6rem;
            font-weight: 700;
            color: var(--primary);
            font-variant-numeric: tabular-nums;
            letter-spacing: -1px;
        }

        /* ── 月份橫幅 ── */
        .month-banner {
            background: linear-gradient(135deg, #4F46E5 0%, #7C3AED 100%);
            border-radius: var(--radius);
            padding: 18px 24px;
            color: white;
            margin-bottom: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .month-banner h2 { font-size: 1rem; font-weight: 700; }
        .month-banner .days-info { font-size: 0.82rem; opacity: 0.75; margin-top: 3px; }
        .month-banner .reset-note { font-size: 0.8rem; opacity: 0.7; text-align: right; line-height: 1.6; }

        /* ── 輸入區 ── */
        .input-card {
            background: var(--surface);
            border-radius: var(--radius);
            padding: 20px 24px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 16px;
        }
        .input-card h2 { font-size: 0.95rem; font-weight: 700; white-space: nowrap; }
        .input-row { display: flex; gap: 10px; flex: 1; }
        .input-wrap { position: relative; flex: 1; }
        .input-wrap .prefix {
            position: absolute; left: 13px; top: 50%; transform: translateY(-50%);
            font-weight: 600; color: var(--text-sub); font-size: 0.95rem;
        }
        input[type="number"] {
            width: 100%; padding: 11px 12px 11px 28px;
            border: 2px solid var(--border); border-radius: 10px;
            font-size: 1rem; color: var(--text); background: #F8FAFC;
            outline: none; transition: border-color 0.2s, background 0.2s;
            -moz-appearance: textfield;
        }
        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; }
        input[type="number"]:focus { border-color: var(--primary); background: white; }
        input[type="number"].error { border-color: var(--danger); }

        button { border: none; cursor: pointer; font-size: 0.9rem; font-weight: 600; border-radius: 10px; transition: all 0.18s; }
        .btn-primary { background: var(--primary); color: white; padding: 11px 22px; }
        .btn-primary:hover { background: var(--primary-dark); transform: translateY(-1px); box-shadow: 0 4px 12px rgba(79,70,229,0.28); }
        .btn-sm-danger { background: #FEE2E2; color: #991B1B; padding: 5px 10px; font-size: 0.78rem; border-radius: 7px; }
        .btn-sm-danger:hover { background: #FECACA; }

        /* ── 卡片樣式 ── */
        .card {
            background: var(--surface);
            border-radius: var(--radius);
            padding: 20px 22px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
        }
        .card-label {
            font-size: 0.73rem; font-weight: 700; color: var(--text-sub);
            text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px;
        }
        .card-value { font-size: 1.85rem; font-weight: 800; color: var(--text); line-height: 1; }
        .card-sub { font-size: 0.82rem; color: var(--text-sub); margin-top: 5px; }

        .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin-bottom: 14px; }

        /* ── 費率標籤 ── */
        .tier-badge {
            display: inline-flex; align-items: center; gap: 5px;
            padding: 3px 10px; border-radius: 20px; font-size: 0.8rem;
            font-weight: 700; margin-top: 6px;
        }
        .tier-dot { width: 7px; height: 7px; border-radius: 50%; }
        .t1-badge { background: #D1FAE5; color: #065F46; }
        .t1-dot   { background: #10B981; }
        .t2-badge { background: #FEF3C7; color: #78350F; }
        .t2-dot   { background: #F59E0B; }
        .t3-badge { background: #FEE2E2; color: #991B1B; }
        .t3-dot   { background: #EF4444; }

        /* ── 三段式費率進度條 ── */
        .tier-progress { margin-top: 12px; }
        .tier-labels {
            display: flex; justify-content: space-between;
            font-size: 0.73rem; color: var(--text-sub); margin-bottom: 5px;
        }
        .tier-track {
            height: 10px; border-radius: 5px; background: #F1F5F9;
            position: relative; overflow: hidden; display: flex;
        }
        .tier-seg {
            height: 100%; transition: flex 0.5s ease;
            position: relative;
        }
        .tier-seg-1 { background: linear-gradient(90deg, #6EE7B7, #10B981); }
        .tier-seg-2 { background: linear-gradient(90deg, #FCD34D, #F59E0B); }
        .tier-seg-3 { background: linear-gradient(90deg, #FCA5A5, #EF4444); }
        .tier-seg-used { opacity: 1; }
        .tier-seg-empty { opacity: 0.15; }

        /* ── 圖表樣式 ── */
        .chart-card { margin-bottom: 14px; }
        .chart-card h2 { font-size: 0.93rem; font-weight: 700; margin-bottom: 14px; }
        .chart-wrap { height: 210px; position: relative; }
        .chart-empty {
            display: flex; align-items: center; justify-content: center;
            height: 100%; color: var(--text-sub); font-size: 0.9rem;
        }

        /* ── 歷史記錄樣式 ── */
        .history-card h2 {
            font-size: 0.93rem; font-weight: 700; margin-bottom: 14px;
            display: flex; align-items: center; justify-content: space-between;
        }
        table { width: 100%; border-collapse: collapse; }
        th {
            text-align: left; font-size: 0.73rem; font-weight: 700;
            color: var(--text-sub); text-transform: uppercase; letter-spacing: 0.05em;
            padding: 6px 12px; border-bottom: 2px solid var(--border);
        }
        td { padding: 11px 12px; border-bottom: 1px solid #F1F5F9; font-size: 0.88rem; }
        tr:last-child td { border-bottom: none; }
        .val-up   { color: var(--success); font-weight: 700; }
        .val-down { color: var(--danger);  font-weight: 700; }
        .tag {
            background: #F1F5F9; color: var(--text-sub);
            padding: 2px 8px; border-radius: 6px; font-size: 0.76rem;
        }

        .empty-state { text-align: center; padding: 48px 0; color: var(--text-sub); }
        .empty-state .icon { font-size: 2.5rem; margin-bottom: 8px; }

        /* ── 充值警示樣式 ── */
        .note {
            background: #FFFBEB; border: 1px solid #FDE68A; border-radius: 10px;
            padding: 10px 14px; font-size: 0.8rem; color: #78350F; margin-bottom: 14px;
        }

        /* ── 響應式排版 ── */
        @media (max-width: 720px) {
            body { padding: 14px; }
            .grid-3 { grid-template-columns: 1fr; }
            .input-card { flex-direction: column; align-items: stretch; }
            .input-row { flex-direction: column; }
            .header { flex-direction: column; gap: 6px; }
            .card-value { font-size: 1.5rem; }
            th:nth-child(4), td:nth-child(4) { display: none; }
        }
    </style>
</head>
<body>
<div class="container">

    <!-- 頁首 -->
    <div class="header">
        <div>
            <h1>宿舍電費追蹤</h1>
            <div class="header-sub">記錄剩餘餘額，自動推算用量與費率</div>
        </div>
        <div class="header-time">
            <div class="date" id="currentDate"></div>
            <div class="time" id="currentTime"></div>
        </div>
    </div>

    <!-- 月份橫幅 -->
    <div class="month-banner">
        <div>
            <h2 id="monthTitle">載入中…</h2>
            <div class="days-info" id="daysInfo"></div>
        </div>
        <div class="reset-note">每月 1 日費率級距重置<br>0~110度 / 111~700度 / 701度以上</div>
    </div>

    <!-- 輸入區 -->
    <div class="input-card">
        <h2>新增讀數</h2>
        <div class="input-row">
            <div class="input-wrap">
                <span class="prefix">$</span>
                <input type="number" id="balanceInput" placeholder="目前剩餘電費（元）" min="0" step="0.01">
            </div>
            <button class="btn-primary" onclick="addReading()">記錄</button>
        </div>
    </div>

    <!-- 充值警示（偵測到餘額增加時顯示）-->
    <div class="note" id="topupNote" style="display:none">
        偵測到餘額增加（可能已充值）。建議在充值前後各記錄一次，以確保本月用量計算精確。
    </div>

    <!-- 統計第一列 -->
    <div class="grid-3">
        <div class="card">
            <div class="card-label">目前餘額</div>
            <div class="card-value" id="currentBalance">--</div>
            <div class="card-sub" id="lastReadingTime">尚未有任何記錄</div>
        </div>
        <div class="card">
            <div class="card-label">本月已用電量</div>
            <div class="card-value" id="currentKwh">--</div>
            <div class="card-sub" id="currentCost">本月花費：--</div>
            <div class="tier-progress" id="tierProgress" style="display:none">
                <div class="tier-labels">
                    <span>0 度</span>
                    <span>110 度</span>
                    <span>700 度</span>
                    <span id="tierProgressMax"></span>
                </div>
                <div class="tier-track" id="tierTrack"></div>
            </div>
        </div>
        <div class="card">
            <div class="card-label">目前費率</div>
            <div class="card-value" id="tierRate">--</div>
            <div id="tierBadgeContainer"></div>
            <div class="card-sub" id="tierRemaining"></div>
        </div>
    </div>

    <!-- 統計第二列（平均值）-->
    <div class="grid-3">
        <div class="card">
            <div class="card-label">平均每小時</div>
            <div class="card-value" id="avgHour">--</div>
            <div class="card-sub">元 / 小時</div>
        </div>
        <div class="card">
            <div class="card-label">平均每天</div>
            <div class="card-value" id="avgDay">--</div>
            <div class="card-sub">元 / 天</div>
        </div>
        <div class="card">
            <div class="card-label">本月預估總花費</div>
            <div class="card-value" id="avgMonth">--</div>
            <div class="card-sub" id="avgMonthSub">依目前用電速率推算</div>
        </div>
    </div>

    <!-- 圖表區 -->
    <div class="card chart-card">
        <h2>餘額變化趨勢</h2>
        <div class="chart-wrap">
            <canvas id="balanceChart"></canvas>
            <div class="chart-empty" id="chartEmpty">新增至少兩筆記錄後顯示圖表</div>
        </div>
    </div>

    <!-- 歷史記錄 -->
    <div class="card history-card">
        <h2>
            <span>歷史記錄</span>
            <button class="btn-sm-danger" onclick="clearAllData()">清除全部</button>
        </h2>
        <div id="historyContent"></div>
    </div>

</div>

<script>
const STORAGE_KEY = 'dorm_elec_v1';

// 費率級距常數
const T1_KWH  = 110,  T1_RATE = 2.1;
const T2_KWH  = 700,  T2_RATE = 2.68;
const T3_RATE = 3.97;
const T1_COST = T1_KWH * T1_RATE;                        // 第一級距上限 $231
const T2_COST = T1_COST + (T2_KWH - T1_KWH) * T2_RATE;  // 累計第二級距上限 $1812.2

let chartInstance = null;

// ── 資料存取 ──────────────────────────────────────────
function load() {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
    catch { return []; }
}
function save(data) { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); }

// ── 計算邏輯 ─────────────────────────────────────────────
function spentToKwh(s) {
    if (s <= 0) return 0;
    if (s <= T1_COST) return s / T1_RATE;
    if (s <= T2_COST) return T1_KWH + (s - T1_COST) / T2_RATE;
    return T2_KWH + (s - T2_COST) / T3_RATE;
}

function tierOf(kwh) {
    if (kwh <= T1_KWH) return { n: 1, rate: T1_RATE, max: T1_KWH,  label: '第一級距', remaining: T1_KWH - kwh };
    if (kwh <= T2_KWH) return { n: 2, rate: T2_RATE, max: T2_KWH,  label: '第二級距', remaining: T2_KWH - kwh };
    return                     { n: 3, rate: T3_RATE, max: null, label: '第三級距', remaining: null };
}

function monthlySpent(readings, year, month) {
    const mrs = readings
        .filter(r => { const d = new Date(r.ts); return d.getFullYear() === year && d.getMonth() === month; })
        .sort((a, b) => a.ts - b.ts);
    if (mrs.length < 2) return { spent: 0, hasTopup: false };
    let spent = 0, hasTopup = false;
    for (let i = 1; i < mrs.length; i++) {
        const diff = mrs[i].bal - mrs[i-1].bal;
        if (diff < 0) spent += -diff;
        else if (diff > 0) hasTopup = true;
    }
    return { spent, hasTopup };
}

// ── 時鐘 ─────────────────────────────────────────────
function tickClock() {
    const now = new Date();
    document.getElementById('currentDate').textContent =
        now.toLocaleDateString('zh-TW', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'short' });
    document.getElementById('currentTime').textContent =
        now.toLocaleTimeString('zh-TW', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
}

// ── 儀表板渲染 ─────────────────────────────────────────
function renderDashboard() {
    const readings = load();
    const now  = new Date();
    const year = now.getFullYear(), month = now.getMonth();
    const daysInMonth = new Date(year, month + 1, 0).getDate();
    const dayOfMonth  = now.getDate();

    // 月份橫幅
    document.getElementById('monthTitle').textContent = `${year} 年 ${month + 1} 月 計費週期`;
    document.getElementById('daysInfo').textContent   =
        `第 ${dayOfMonth} 天，剩餘 ${daysInMonth - dayOfMonth} 天`;

    // 依時間排序所有記錄
    const sorted = [...readings].sort((a, b) => a.ts - b.ts);

    // 目前餘額
    if (sorted.length > 0) {
        const latest = sorted[sorted.length - 1];
        document.getElementById('currentBalance').textContent = `$${latest.bal.toFixed(1)}`;
        const ld = new Date(latest.ts);
        document.getElementById('lastReadingTime').textContent =
            `最後記錄：${ld.toLocaleString('zh-TW', { month: 'numeric', day: 'numeric', hour: '2-digit', minute: '2-digit' })}`;
    } else {
        document.getElementById('currentBalance').textContent = '--';
        document.getElementById('lastReadingTime').textContent = '尚未有任何記錄';
    }

    // 本月費用計算
    const { spent, hasTopup } = monthlySpent(readings, year, month);
    document.getElementById('topupNote').style.display = hasTopup ? '' : 'none';

    const mrs = readings
        .filter(r => { const d = new Date(r.ts); return d.getFullYear() === year && d.getMonth() === month; })
        .sort((a, b) => a.ts - b.ts);

    if (mrs.length >= 2) {
        const kwh  = spentToKwh(spent);
        const tier = tierOf(kwh);

        // 用電度數卡片
        document.getElementById('currentKwh').textContent  = `${kwh.toFixed(1)} 度`;
        document.getElementById('currentCost').textContent = `本月花費：$${spent.toFixed(1)}`;

        // 三段費率進度條
        document.getElementById('tierProgress').style.display = '';
        const ext700 = Math.max(kwh, T2_KWH);
        const progressMax = tier.n === 3 ? kwh * 1.1 : T2_KWH;
        document.getElementById('tierProgressMax').textContent =
            tier.n === 3 ? `${kwh.toFixed(0)} 度` : '700 度';

        const usedT1 = Math.min(kwh, T1_KWH);
        const usedT2 = Math.max(0, Math.min(kwh - T1_KWH, T2_KWH - T1_KWH));
        const usedT3 = Math.max(0, kwh - T2_KWH);

        // flex 比例：110:590:T3動態區間
        const t3base = tier.n === 3 ? Math.max(kwh - T2_KWH, 10) : 10;
        const total  = T1_KWH + (T2_KWH - T1_KWH) + t3base;

        document.getElementById('tierTrack').innerHTML =
            `<div class="tier-seg tier-seg-1 ${usedT1 > 0 ? 'tier-seg-used' : 'tier-seg-empty'}" style="flex:${T1_KWH}"></div>` +
            `<div class="tier-seg tier-seg-2 ${usedT2 > 0 ? 'tier-seg-used' : 'tier-seg-empty'}" style="flex:${T2_KWH - T1_KWH}"></div>` +
            `<div class="tier-seg tier-seg-3 ${usedT3 > 0 ? 'tier-seg-used' : 'tier-seg-empty'}" style="flex:${t3base}"></div>`;

        // 費率卡片
        document.getElementById('tierRate').textContent = `$${tier.rate}/度`;
        const bn = document.getElementById('tierBadgeContainer');
        bn.innerHTML = `<div class="tier-badge t${tier.n}-badge"><div class="tier-dot t${tier.n}-dot"></div>${tier.label}</div>`;
        document.getElementById('tierRemaining').textContent =
            tier.remaining != null
                ? `距下一級距還有 ${tier.remaining.toFixed(1)} 度`
                : '已達最高費率級距';

        // 平均值計算
        const hoursElapsed = (now - new Date(mrs[0].ts)) / 3600000;
        const daysElapsed  = hoursElapsed / 24;
        if (hoursElapsed > 0.05) {
            document.getElementById('avgHour').textContent  = `$${(spent / hoursElapsed).toFixed(3)}`;
            document.getElementById('avgDay').textContent   = `$${(spent / daysElapsed).toFixed(1)}`;
            const projected = (spent / daysElapsed) * daysInMonth;
            document.getElementById('avgMonth').textContent = `$${projected.toFixed(0)}`;
            document.getElementById('avgMonthSub').textContent = `約 ${spentToKwh(projected).toFixed(0)} 度`;
        }
    } else {
        document.getElementById('currentKwh').textContent  = mrs.length === 1 ? '再記一次即可計算' : '--';
        document.getElementById('currentCost').textContent = '需要至少兩筆記錄';
        document.getElementById('tierProgress').style.display = 'none';
        document.getElementById('tierRate').textContent = '--';
        document.getElementById('tierBadgeContainer').innerHTML = '';
        document.getElementById('tierRemaining').textContent = '';
        ['avgHour','avgDay','avgMonth'].forEach(id => document.getElementById(id).textContent = '--');
        document.getElementById('avgMonthSub').textContent = '依目前用電速率推算';
    }

    renderChart(sorted);
    renderHistory(sorted);
}

// ── 圖表渲染 ─────────────────────────────────────────────
function renderChart(sorted) {
    const canvas = document.getElementById('balanceChart');
    const empty  = document.getElementById('chartEmpty');

    if (sorted.length < 2) {
        canvas.style.display = 'none';
        empty.style.display  = '';
        if (chartInstance) { chartInstance.destroy(); chartInstance = null; }
        return;
    }

    canvas.style.display = '';
    empty.style.display  = 'none';

    if (chartInstance) chartInstance.destroy();
    chartInstance = new Chart(canvas.getContext('2d'), {
        type: 'line',
        data: {
            datasets: [{
                data: sorted.map(r => ({ x: r.ts, y: r.bal })),
                borderColor: '#4F46E5',
                backgroundColor: ctx => {
                    const g = ctx.chart.ctx.createLinearGradient(0, 0, 0, 210);
                    g.addColorStop(0, 'rgba(79,70,229,0.15)');
                    g.addColorStop(1, 'rgba(79,70,229,0.00)');
                    return g;
                },
                borderWidth: 2.5,
                pointBackgroundColor: '#4F46E5',
                pointBorderColor: '#fff',
                pointBorderWidth: 2,
                pointRadius: 4.5,
                pointHoverRadius: 7,
                fill: true,
                tension: 0.4,
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                legend: { display: false },
                tooltip: {
                    backgroundColor: '#1E293B',
                    padding: 10,
                    cornerRadius: 8,
                    callbacks: {
                        title: items => {
                            const d = new Date(items[0].raw.x);
                            return d.toLocaleDateString('zh-TW', { month: 'numeric', day: 'numeric' }) + ' ' +
                                   d.toLocaleTimeString('zh-TW', { hour: '2-digit', minute: '2-digit' });
                        },
                        label: ctx => ` 餘額 $${ctx.raw.y.toFixed(1)}`
                    }
                }
            },
            scales: {
                x: {
                    type: 'time',
                    time: {
                        displayFormats: {
                            minute: 'H:mm',
                            hour:   'M/d H:mm',
                            day:    'M/d',
                        }
                    },
                    grid: { color: '#F1F5F9' },
                    ticks: { color: '#94A3B8', font: { size: 10 }, maxRotation: 35, maxTicksLimit: 10, autoSkip: true }
                },
                y: {
                    grid: { color: '#F1F5F9' },
                    ticks: { color: '#94A3B8', font: { size: 10 }, callback: v => `$${v}` }
                }
            }
        }
    });
}

// ── 歷史記錄渲染 ───────────────────────────────────────────
function renderHistory(sorted) {
    const el = document.getElementById('historyContent');
    if (sorted.length === 0) {
        el.innerHTML = `<div class="empty-state"><div class="icon">📊</div>尚無記錄，輸入目前剩餘電費即可開始追蹤</div>`;
        return;
    }
    const rows = [...sorted].reverse().map((r, i, arr) => {
        const prev = arr[i + 1];
        const d = new Date(r.ts);
        const timeStr = d.toLocaleString('zh-TW', { month: 'numeric', day: 'numeric', hour: '2-digit', minute: '2-digit' });
        let changeHtml = '<span style="color:#CBD5E1">—</span>';
        if (prev) {
            const diff = r.bal - prev.bal;
            if      (diff > 0.005) changeHtml = `<span class="val-up">+$${diff.toFixed(1)} 充值</span>`;
            else if (diff < -0.005) changeHtml = `<span class="val-down">−$${(-diff).toFixed(1)}</span>`;
        }
        const monthLabel = `${d.getFullYear()}/${d.getMonth()+1}`;
        return `<tr>
            <td>${timeStr}</td>
            <td style="font-weight:700">$${r.bal.toFixed(1)}</td>
            <td>${changeHtml}</td>
            <td><span class="tag">${monthLabel}</span></td>
            <td><button class="btn-sm-danger" onclick="deleteReading('${r.id}')">刪除</button></td>
        </tr>`;
    }).join('');

    el.innerHTML = `<table>
        <thead><tr>
            <th>時間</th><th>餘額</th><th>變化</th><th>月份</th><th></th>
        </tr></thead>
        <tbody>${rows}</tbody>
    </table>`;
}

// ── 使用者操作 ───────────────────────────────────────────
function addReading() {
    const input = document.getElementById('balanceInput');
    const val   = parseFloat(input.value);
    if (isNaN(val) || val < 0) {
        input.classList.add('error');
        setTimeout(() => input.classList.remove('error'), 900);
        return;
    }
    const data = load();
    data.push({ id: Date.now().toString(), ts: Date.now(), bal: val });
    save(data);
    input.value = '';
    renderDashboard();
}

function deleteReading(id) {
    save(load().filter(r => r.id !== id));
    renderDashboard();
}

function clearAllData() {
    if (confirm('確定要清除所有記錄嗎？此動作無法復原。')) {
        localStorage.removeItem(STORAGE_KEY);
        renderDashboard();
    }
}

// ── 初始化 ──────────────────────────────────────────────
document.getElementById('balanceInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') addReading();
});

tickClock();
setInterval(tickClock, 1000);
renderDashboard();
</script>
